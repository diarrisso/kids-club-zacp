name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions — this CI only reads the repo.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Pest + PostgreSQL)
    runs-on: ubuntu-latest

    # The test suite is pinned to PostgreSQL in phpunit.xml
    # (DB_CONNECTION=pgsql, DB_DATABASE=masinga_booking_test).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: masinga_booking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # composer.lock pulls symfony v8.1 (requires php >=8.4.1), so the CI
          # must match the dev runtime even though composer.json allows ^8.3.
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, pgsql, dom, curl, fileinfo, tokenizer, xml, ctype, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build assets (Vite manifest is needed by Feature tests rendering Inertia pages)
        run: npm ci && npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          # Point the app at the CI PostgreSQL service (phpunit.xml already
          # forces DB_CONNECTION=pgsql + DB_DATABASE=masinga_booking_test).
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=masinga_booking_test"
            echo "DB_USERNAME=postgres"
            echo "DB_PASSWORD=postgres"
          } >> .env
          php artisan key:generate

      - name: Run tests (composer test)
        run: composer test

  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Run widget tests
        run: npm run test:widget

      - name: Build assets
        run: npm run build
