name: Deploy

# Deploy to the production VPS only after the CI workflow succeeds on main.
# Also runnable manually from the Actions tab.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never run two production deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (Hostinger)
    runs-on: ubuntu-latest
    # On workflow_run, only deploy if CI passed. workflow_dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build assets locally (in the runner — never on the small VPS)
        # Build BOTH the main app (public/build) and the embeddable widget
        # (public/widget/masinga-widget.js). The widget is gitignored, so the
        # server's `git pull` never updates it — it must be built + rsync'd here.
        run: npm ci && npm run build && npm run build:widget

      # Load the deploy key into an ssh-agent (robust key handling — avoids the
      # manual-key 'Permission denied (publickey)' failures). Pinned to a SHA.
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Pin the VPS host key (captured out-of-band) so a MITM/rotated key is
      # rejected — StrictHostKeyChecking=yes below relies on this.
      - name: Pin host key
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync built assets
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes -o ConnectTimeout=20" \
            public/build/ "$VPS_USER@$VPS_HOST:$VPS_PATH/backend/public/build/"

      - name: Rsync embeddable widget (public/widget/masinga-widget.js)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        # Single file, NO --delete: keep the server's other public/widget contents
        # (e.g. test.html) untouched.
        run: |
          rsync -az \
            -e "ssh -o StrictHostKeyChecking=yes -o ConnectTimeout=20" \
            public/widget/masinga-widget.js \
            "$VPS_USER@$VPS_HOST:$VPS_PATH/backend/public/widget/masinga-widget.js"

      - name: Deploy on server (pull, composer, migrate, optimize, restart fpm)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "$VPS_USER@$VPS_HOST" "cd '$VPS_PATH/backend' && \
            git pull origin main && \
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction && \
            php artisan migrate --force && \
            php artisan optimize:clear && php artisan optimize && \
            chown -R www-data:www-data storage bootstrap/cache && \
            systemctl restart php8.4-fpm && \
            echo '=== DEPLOY OK ==='"

      - name: Smoke check
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" "curl -sS -o /dev/null -w 'HTTP %{http_code}\n' https://kidsclub.masingatech.com/login"

      - name: Purge Cloudflare cache (widget JS)
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # The widget JS is edge-cached (~4h). Without a purge, parents keep getting
        # the old widget after a deploy. Skips cleanly if the CF secrets aren't set
        # (so the deploy never fails just because the purge isn't configured yet).
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets not set — skipping cache purge (widget refreshes on TTL expiry)."
            exit 0
          fi
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://kidsclub.masingatech.com/widget/masinga-widget.js"]}' \
            && echo "Cloudflare cache purged for the widget JS."
